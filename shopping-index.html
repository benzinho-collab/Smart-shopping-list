<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopping List</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Shopping" />
  <link rel="manifest" href="manifest.json" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f0faf0; min-height: 100vh; color: #1a2e1a; }

    header {
      background: #1a6b1a;
      color: white;
      padding: 20px 20px 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
    .header-sub { font-size: 13px; color: #a7f3a7; margin-top: 2px; }

    .add-bar {
      display: flex;
      gap: 10px;
      padding: 16px;
      background: white;
      border-bottom: 1px solid #d1f0d1;
      position: sticky;
      top: 72px;
      z-index: 9;
    }
    .add-bar input {
      flex: 1;
      padding: 12px 14px;
      border-radius: 10px;
      border: 2px solid #d1f0d1;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      background: #f0faf0;
    }
    .add-bar input:focus { border-color: #1a6b1a; background: white; }
    .btn-add {
      background: #1a6b1a;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 20px;
      cursor: pointer;
      font-weight: 700;
    }

    .stats-bar {
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #4a7a4a;
    }
    .btn-clear { background: none; border: none; color: #e53935; font-size: 13px; font-weight: 600; cursor: pointer; padding: 4px 8px; border-radius: 6px; }
    .btn-clear:active { background: #ffeaea; }

    .list { padding: 0 16px 100px; }

    .item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: white;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      cursor: pointer;
      transition: transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .item:active { transform: scale(0.98); }
    .item.checked { opacity: 0.45; }

    .check-circle {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2.5px solid #d1f0d1;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      background: white;
    }
    .item.checked .check-circle {
      background: #1a6b1a;
      border-color: #1a6b1a;
    }
    .check-circle svg { display: none; }
    .item.checked .check-circle svg { display: block; }

    .item-name {
      flex: 1;
      font-size: 16px;
      font-weight: 500;
    }
    .item.checked .item-name {
      text-decoration: line-through;
      color: #888;
    }

    .item-qty {
      font-size: 13px;
      color: #4a7a4a;
      background: #f0faf0;
      border-radius: 6px;
      padding: 2px 8px;
      font-weight: 600;
    }

    .btn-delete {
      background: none;
      border: none;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      padding: 2px 4px;
      line-height: 1;
    }
    .btn-delete:active { color: #e53935; }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #4a7a4a;
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty p { font-size: 15px; }

    .progress-bar-wrap { height: 4px; background: #d1f0d1; margin: 0 16px 4px; border-radius: 2px; }
    .progress-bar { height: 4px; background: #1a6b1a; border-radius: 2px; transition: width 0.4s; }

    /* Modal for qty */
    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; align-items: flex-end; justify-content: center; padding: 0; }
    .modal-bg.open { display: flex; }
    .modal { background: white; border-radius: 20px 20px 0 0; padding: 24px; width: 100%; max-width: 500px; }
    .modal h3 { font-size: 17px; margin-bottom: 16px; }
    .modal input { width: 100%; padding: 10px 14px; border-radius: 10px; border: 2px solid #d1f0d1; font-size: 16px; font-family: inherit; outline: none; margin-bottom: 14px; }
    .modal input:focus { border-color: #1a6b1a; }
    .modal-btns { display: flex; gap: 10px; }
    .btn-cancel { flex: 1; padding: 12px; border-radius: 10px; border: none; background: #f0faf0; color: #1a2e1a; font-weight: 600; cursor: pointer; font-size: 15px; }
    .btn-save { flex: 1; padding: 12px; border-radius: 10px; border: none; background: #1a6b1a; color: white; font-weight: 600; cursor: pointer; font-size: 15px; }

    .done-banner {
      display: none;
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a6b1a;
      color: white;
      padding: 14px 28px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 15px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      z-index: 50;
    }
  </style>
</head>
<body>

<header>
  <h1>🛒 Shopping List</h1>
  <div class="header-sub" id="headerSub">Add your items below</div>
</header>

<div class="add-bar">
  <input type="text" id="itemInput" placeholder="Add an item..." autocomplete="off" />
  <button class="btn-add" onclick="addItem()">+</button>
</div>

<div style="padding: 10px 16px 0;">
  <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
</div>

<div class="stats-bar">
  <span id="statsText">0 items</span>
  <button class="btn-clear" onclick="clearChecked()">Remove checked</button>
</div>

<div class="list" id="list"></div>

<div class="done-banner" id="doneBanner">🎉 All done! Great shop!</div>

<!-- Qty Modal -->
<div class="modal-bg" id="qtyModal">
  <div class="modal">
    <h3 id="modalItemName">Edit item</h3>
    <input type="text" id="qtyInput" placeholder="Quantity (e.g. 2, 500g, 1 pack)" />
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveQty()">Save</button>
    </div>
  </div>
</div>

<script>
  let items = JSON.parse(localStorage.getItem('sl_items') || '[]');
  let editId = null;

  function save() { localStorage.setItem('sl_items', JSON.stringify(items)); }

  function render() {
    const list = document.getElementById('list');
    const total = items.length;
    const checked = items.filter(i => i.checked).length;

    // Stats
    document.getElementById('statsText').textContent = total === 0 ? '0 items' : `${checked} of ${total} found`;
    document.getElementById('headerSub').textContent = total === 0 ? 'Add your items below' : `${total - checked} item${total - checked !== 1 ? 's' : ''} left to find`;
    const pct = total === 0 ? 0 : (checked / total) * 100;
    document.getElementById('progressBar').style.width = pct + '%';

    // Done banner
    const banner = document.getElementById('doneBanner');
    if (total > 0 && checked === total) {
      banner.style.display = 'block';
      setTimeout(() => banner.style.display = 'none', 3000);
    }

    if (total === 0) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">🛍️</div><p>Your list is empty.<br>Add something above!</p></div>`;
      return;
    }

    // Unchecked first, then checked
    const sorted = [...items].sort((a, b) => a.checked - b.checked);
    list.innerHTML = sorted.map(item => `
      <div class="item ${item.checked ? 'checked' : ''}" onclick="toggleItem(${item.id})">
        <div class="check-circle">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2 7l4 4 6-6" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="item-name">${item.name}</span>
        ${item.qty ? `<span class="item-qty">${item.qty}</span>` : ''}
        <button class="btn-delete" onclick="event.stopPropagation(); deleteItem(${item.id})">×</button>
      </div>
    `).join('');
  }

  function addItem() {
    const input = document.getElementById('itemInput');
    const val = input.value.trim();
    if (!val) return;
    items.push({ id: Date.now(), name: val, checked: false, qty: '' });
    input.value = '';
    save(); render();
    input.focus();
  }

  function toggleItem(id) {
    items = items.map(i => i.id === id ? { ...i, checked: !i.checked } : i);
    save(); render();
  }

  function deleteItem(id) {
    items = items.filter(i => i.id !== id);
    save(); render();
  }

  function clearChecked() {
    items = items.filter(i => !i.checked);
    save(); render();
  }

  function openQty(id) {
    const item = items.find(i => i.id === id);
    if (!item) return;
    editId = id;
    document.getElementById('modalItemName').textContent = item.name;
    document.getElementById('qtyInput').value = item.qty || '';
    document.getElementById('qtyModal').classList.add('open');
    setTimeout(() => document.getElementById('qtyInput').focus(), 100);
  }

  function closeModal() { document.getElementById('qtyModal').classList.remove('open'); }

  function saveQty() {
    const qty = document.getElementById('qtyInput').value.trim();
    items = items.map(i => i.id === editId ? { ...i, qty } : i);
    save(); render(); closeModal();
  }

  // Enter key to add
  document.getElementById('itemInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addItem();
  });

  render();
</script>
</body>
</html>
