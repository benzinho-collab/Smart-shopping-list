<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopping List</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Shopping" />
  <link rel="manifest" href="shopping-manifest.json" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f0faf0; min-height: 100vh; color: #1a2e1a; }

    header {
      background: #1a6b1a;
      color: white;
      padding: 20px 20px 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
    .header-sub { font-size: 13px; color: #a7f3a7; margin-top: 2px; }

    .add-bar {
      display: flex;
      gap: 10px;
      padding: 16px;
      background: white;
      border-bottom: 1px solid #d1f0d1;
      position: sticky;
      top: 72px;
      z-index: 9;
    }
    .add-bar input {
      flex: 1;
      padding: 12px 14px;
      border-radius: 10px;
      border: 2px solid #d1f0d1;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      background: #f0faf0;
    }
    .add-bar input:focus { border-color: #1a6b1a; background: white; }
    .btn-add {
      background: #1a6b1a;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 20px;
      cursor: pointer;
      font-weight: 700;
    }

    .stats-bar {
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #4a7a4a;
    }
    .btn-clear { background: none; border: none; color: #e53935; font-size: 13px; font-weight: 600; cursor: pointer; padding: 4px 8px; border-radius: 6px; }

    .list { padding: 0 16px 100px; }

    .item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: white;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      cursor: pointer;
      transition: transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .item:active { transform: scale(0.98); }
    .item.checked { opacity: 0.45; }

    .check-circle {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2.5px solid #d1f0d1;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      background: white;
    }
    .item.checked .check-circle {
      background: #1a6b1a;
      border-color: #1a6b1a;
    }
    .check-circle svg { display: none; }
    .item.checked .check-circle svg { display: block; }

    .item-name {
      flex: 1;
      font-size: 16px;
      font-weight: 500;
    }
    .item.checked .item-name {
      text-decoration: line-through;
      color: #888;
    }

    .btn-delete {
      background: none;
      border: none;
      color: #ccc;
      font-size: 22px;
      cursor: pointer;
      padding: 2px 6px;
      line-height: 1;
    }
    .btn-delete:active { color: #e53935; }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #4a7a4a;
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }

    .progress-bar-wrap { height: 4px; background: #d1f0d1; margin: 0 16px 4px; border-radius: 2px; }
    .progress-bar { height: 4px; background: #1a6b1a; border-radius: 2px; transition: width 0.4s; }

    .done-banner {
      display: none;
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a6b1a;
      color: white;
      padding: 14px 28px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 15px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      z-index: 50;
      white-space: nowrap;
    }

    .save-indicator {
      position: fixed;
      top: 10px;
      right: 10px;
      background: #1a6b1a;
      color: white;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 200;
    }
    .save-indicator.show { opacity: 1; }
  </style>
</head>
<body>

<header>
  <h1>🛒 Shopping List</h1>
  <div class="header-sub" id="headerSub">Add your items below</div>
</header>

<div class="add-bar">
  <input type="text" id="itemInput" placeholder="Add an item..." autocomplete="off" />
  <button class="btn-add" onclick="addItem()">+</button>
</div>

<div style="padding: 10px 16px 0;">
  <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
</div>

<div class="stats-bar">
  <span id="statsText">0 items</span>
  <button class="btn-clear" onclick="clearChecked()">Remove checked</button>
</div>

<div class="list" id="list"></div>

<div class="done-banner" id="doneBanner">🎉 All done! Great shop!</div>
<div class="save-indicator" id="saveIndicator">✓ Saved</div>

<script>
  const STORAGE_KEY = 'sl_items_v2';
  const BACKUP_KEY = 'sl_items_backup';

  // Load items - try main storage first, then backup
  function loadItems() {
    try {
      const main = localStorage.getItem(STORAGE_KEY);
      if (main) {
        const parsed = JSON.parse(main);
        if (Array.isArray(parsed) && parsed.length >= 0) return parsed;
      }
    } catch(e) {}
    try {
      const backup = localStorage.getItem(BACKUP_KEY);
      if (backup) {
        const parsed = JSON.parse(backup);
        if (Array.isArray(parsed)) return parsed;
      }
    } catch(e) {}
    return [];
  }

  let items = loadItems();

  function save() {
    try {
      const data = JSON.stringify(items);
      localStorage.setItem(STORAGE_KEY, data);
      localStorage.setItem(BACKUP_KEY, data);
      // Also save to sessionStorage as extra backup
      sessionStorage.setItem(STORAGE_KEY, data);
      showSaved();
    } catch(e) {
      console.error('Save failed', e);
    }
  }

  function showSaved() {
    const el = document.getElementById('saveIndicator');
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1200);
  }

  // Auto-save every 10 seconds as extra protection
  setInterval(() => { if (items.length > 0) save(); }, 10000);

  // Save when page is about to close/hide
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden') save();
  });
  window.addEventListener('pagehide', save);
  window.addEventListener('beforeunload', save);

  function render() {
    const total = items.length;
    const checked = items.filter(i => i.checked).length;

    document.getElementById('statsText').textContent = total === 0 ? '0 items' : `${checked} of ${total} found`;
    document.getElementById('headerSub').textContent = total === 0 ? 'Add your items below' : `${total - checked} item${total - checked !== 1 ? 's' : ''} left to find`;
    const pct = total === 0 ? 0 : (checked / total) * 100;
    document.getElementById('progressBar').style.width = pct + '%';

    const banner = document.getElementById('doneBanner');
    if (total > 0 && checked === total) {
      banner.style.display = 'block';
      setTimeout(() => banner.style.display = 'none', 3000);
    }

    const list = document.getElementById('list');
    if (total === 0) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">🛍️</div><p>Your list is empty.<br>Add something above!</p></div>`;
      return;
    }

    const sorted = [...items].sort((a, b) => a.checked - b.checked);
    list.innerHTML = sorted.map(item => `
      <div class="item ${item.checked ? 'checked' : ''}" onclick="toggleItem(${item.id})">
        <div class="check-circle">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2 7l4 4 6-6" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="item-name">${escapeHtml(item.name)}</span>
        <button class="btn-delete" onclick="event.stopPropagation(); deleteItem(${item.id})">×</button>
      </div>
    `).join('');
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function addItem() {
    const input = document.getElementById('itemInput');
    const val = input.value.trim();
    if (!val) return;
    items.push({ id: Date.now(), name: val, checked: false });
    input.value = '';
    save();
    render();
    input.focus();
  }

  function toggleItem(id) {
    items = items.map(i => i.id === id ? { ...i, checked: !i.checked } : i);
    save();
    render();
  }

  function deleteItem(id) {
    items = items.filter(i => i.id !== id);
    save();
    render();
  }

  function clearChecked() {
    if (items.filter(i => i.checked).length === 0) return;
    if (confirm('Remove all checked items?')) {
      items = items.filter(i => !i.checked);
      save();
      render();
    }
  }

  document.getElementById('itemInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addItem();
  });

  render();
</script>
</body>
</html>
